worker_processes 5;
daemon off;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    include $!{nginx}/conf/mime.types;
    index index.html index.htm index.php;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] $status '
        '"$request" $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /dev/stdout;
    error_log /dev/stdout;
    sendfile on;
    tcp_nopush on;
    server_names_hash_bucket_size 128;

    # Gzip compression for mobile optimization
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name localhost;

        root /app/public;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        index index.html;
        charset utf-8;

        # API routing - all /api/ requests go to api/index.php
        location /api/ {
            alias /app/api/;
            try_files $uri $uri/ /api/index.php?$query_string;

            location ~ \.php$ {
                fastcgi_pass 127.0.0.1:9000;
                fastcgi_param SCRIPT_FILENAME $request_filename;
                include $!{nginx}/conf/fastcgi_params;
                include $!{nginx}/conf/fastcgi.conf;
            }
        }

        # Static assets with caching
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|json)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # PWA manifest and service worker
        location = /manifest.json {
            add_header Cache-Control "public, max-age=3600";
            try_files $uri =404;
        }

        # Main SPA - serve index.html for all other routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # PHP files in public directory (shouldn't be any, but just in case)
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
        }

        # Deny access to hidden files and includes directory
        location ~ /\. {
            deny all;
        }

        location /includes/ {
            deny all;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt { access_log off; log_not_found off; }
    }
}
